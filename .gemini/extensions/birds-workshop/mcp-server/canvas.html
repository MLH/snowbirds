<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw Your Bird!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Courier New", Courier, monospace;
      background: #008080;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }

    #app {
      display: flex;
      background: #c0c0c0;
      border: 3px outset #c0c0c0;
      box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #c0c0c0;
      border-right: 2px inset #808080;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      background: #000080;
      color: #ffffff;
      padding: 6px 4px;
      border: 2px inset #808080;
      letter-spacing: 1px;
    }

    .section-label {
      font-size: 11px;
      font-weight: bold;
      color: #000000;
      margin-bottom: 2px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-group input[type="text"] {
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      padding: 3px 5px;
      border: 2px inset #808080;
      background: #ffffff;
      color: #000000;
      width: 100%;
    }

    .field-group input[type="text"]:focus {
      outline: 1px dotted #000000;
    }

    /* Brush size */
    #brush-size-display {
      font-size: 11px;
      text-align: right;
      color: #000080;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #000080;
      cursor: pointer;
    }

    /* Color palette */
    #palette {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border: 2px outset #c0c0c0;
      cursor: pointer;
      transition: transform 0.05s;
    }

    .color-swatch:hover {
      border: 2px inset #808080;
      transform: scale(1.1);
    }

    .color-swatch.selected {
      border: 2px inset #000000;
      transform: scale(1.15);
      outline: 1px solid #ffffff;
    }

    /* Tool buttons */
    .btn-row {
      display: flex;
      gap: 6px;
    }

    .tool-btn {
      flex: 1;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      font-weight: bold;
      padding: 5px 4px;
      border: 2px outset #c0c0c0;
      background: #c0c0c0;
      color: #000000;
      cursor: pointer;
      text-align: center;
    }

    .tool-btn:active {
      border: 2px inset #808080;
    }

    .tool-btn.active {
      border: 2px inset #808080;
      background: #a0a0a0;
    }

    .action-btn {
      width: 100%;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 4px;
      border: 2px outset #c0c0c0;
      background: #c0c0c0;
      color: #000000;
      cursor: pointer;
      text-align: center;
    }

    .action-btn:active {
      border: 2px inset #808080;
    }

    .action-btn:hover {
      background: #d4d4d4;
    }

    #done-btn {
      margin-top: auto;
      padding: 10px 4px;
      font-size: 15px;
      letter-spacing: 2px;
      background: #008000;
      color: #ffffff;
      border: 3px outset #00c000;
    }

    #done-btn:hover:not(:disabled) {
      background: #00a000;
    }

    #done-btn:active:not(:disabled) {
      border: 3px inset #004000;
    }

    #done-btn:disabled {
      background: #606060;
      color: #a0a0a0;
      border: 3px outset #808080;
      cursor: not-allowed;
    }

    .divider {
      border: none;
      border-top: 2px inset #808080;
      margin: 2px 0;
    }

    /* ── Canvas area ── */
    #canvas-wrapper {
      background: #808080;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px inset #606060;
    }

    #drawing-canvas {
      display: block;
      border: 2px inset #404040;
      cursor: crosshair;
      background: #ffffff;
    }

    /* ── Overlay ── */
    #success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 128, 0.92);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }

    #success-overlay.visible {
      display: flex;
    }

    #success-overlay h2 {
      font-family: "Courier New", Courier, monospace;
      font-size: 36px;
      font-weight: bold;
      color: #ffff00;
      text-align: center;
      text-shadow: 3px 3px 0 #000000;
      letter-spacing: 3px;
      border: 4px outset #c0c0c0;
      padding: 16px 32px;
      background: #000080;
    }

    #success-overlay p {
      font-family: "Courier New", Courier, monospace;
      font-size: 18px;
      color: #c0c0c0;
      text-align: center;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <h1>Draw Your Bird!</h1>

    <div class="field-group">
      <span class="section-label">Your Name:</span>
      <input type="text" id="bird-name" placeholder="Anonymous" maxlength="40">
    </div>

    <div class="field-group">
      <span class="section-label">Where You're From:</span>
      <input type="text" id="bird-origin" placeholder="Parts Unknown" maxlength="60">
    </div>

    <hr class="divider">

    <div class="field-group">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="section-label">Brush Size:</span>
        <span id="brush-size-display">12px</span>
      </div>
      <input type="range" id="brush-size" min="1" max="60" value="12">
    </div>

    <hr class="divider">

    <div class="field-group">
      <span class="section-label">Colors:</span>
      <div id="palette"></div>
    </div>

    <hr class="divider">

    <div class="btn-row">
      <button class="tool-btn active" id="btn-brush">Brush</button>
      <button class="tool-btn" id="btn-eraser">Eraser</button>
    </div>

    <div class="btn-row">
      <button class="action-btn" id="btn-undo">Undo</button>
      <button class="action-btn" id="btn-clear">Clear</button>
    </div>

    <button class="action-btn" id="done-btn">DONE</button>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrapper">
    <canvas id="drawing-canvas" width="800" height="600"></canvas>
  </div>
</div>

<!-- Success overlay -->
<div id="success-overlay">
  <h2>Sent to Gemini!</h2>
  <p>Head back to the terminal...</p>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  const COLORS = [
    "#000000", "#ffffff", "#808080", "#c0c0c0",
    "#800000", "#ff0000", "#ff6600", "#ffcc00",
    "#ffff00", "#00ff00", "#008000", "#00ffff",
    "#0000ff", "#000080", "#800080", "#ff00ff",
    "#ff69b4", "#8b4513", "#deb887", "#ffd700"
  ];

  const MAX_UNDO = 30;

  let currentColor = "#000000";
  let brushSize = 12;
  let isEraser = false;
  let isDrawing = false;
  let lastX = 0;
  let lastY = 0;
  let undoStack = [];

  // ── Canvas setup ─────────────────────────────────────────────────────────
  const canvas = document.getElementById("drawing-canvas");
  const ctx = canvas.getContext("2d");

  function fillWhite() {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  fillWhite();
  saveState();

  function saveState() {
    if (undoStack.length >= MAX_UNDO) {
      undoStack.shift();
    }
    undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  }

  // ── Color palette ─────────────────────────────────────────────────────────
  const palette = document.getElementById("palette");

  COLORS.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "color-swatch" + (color === currentColor ? " selected" : "");
    swatch.style.backgroundColor = color;
    swatch.title = color;
    swatch.addEventListener("click", () => {
      currentColor = color;
      isEraser = false;
      document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
      swatch.classList.add("selected");
      document.getElementById("btn-brush").classList.add("active");
      document.getElementById("btn-eraser").classList.remove("active");
    });
    palette.appendChild(swatch);
  });

  // ── Brush size ────────────────────────────────────────────────────────────
  const brushSlider = document.getElementById("brush-size");
  const brushDisplay = document.getElementById("brush-size-display");

  brushSlider.addEventListener("input", () => {
    brushSize = parseInt(brushSlider.value, 10);
    brushDisplay.textContent = brushSize + "px";
  });

  // ── Tool toggles ──────────────────────────────────────────────────────────
  document.getElementById("btn-brush").addEventListener("click", () => {
    isEraser = false;
    document.getElementById("btn-brush").classList.add("active");
    document.getElementById("btn-eraser").classList.remove("active");
  });

  document.getElementById("btn-eraser").addEventListener("click", () => {
    isEraser = true;
    document.getElementById("btn-eraser").classList.add("active");
    document.getElementById("btn-brush").classList.remove("active");
  });

  // ── Undo / Clear ─────────────────────────────────────────────────────────
  document.getElementById("btn-undo").addEventListener("click", () => {
    if (undoStack.length > 1) {
      undoStack.pop();
      ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
    }
  });

  document.getElementById("btn-clear").addEventListener("click", () => {
    saveState();
    fillWhite();
    saveState();
  });

  // ── Drawing ───────────────────────────────────────────────────────────────
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  canvas.addEventListener("mousedown", e => {
    if (e.button !== 0) return;
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    saveState();

    // Draw a dot on click
    ctx.beginPath();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = isEraser ? "#ffffff" : currentColor;
    ctx.lineWidth = isEraser ? brushSize * 2 : brushSize;
    ctx.arc(pos.x, pos.y, (isEraser ? brushSize * 2 : brushSize) / 2, 0, Math.PI * 2);
    ctx.fillStyle = isEraser ? "#ffffff" : currentColor;
    ctx.fill();
  });

  canvas.addEventListener("mousemove", e => {
    if (!isDrawing) return;
    const pos = getPos(e);

    ctx.beginPath();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = isEraser ? "#ffffff" : currentColor;
    ctx.lineWidth = isEraser ? brushSize * 2 : brushSize;
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();

    lastX = pos.x;
    lastY = pos.y;
  });

  canvas.addEventListener("mouseup", () => { isDrawing = false; });
  canvas.addEventListener("mouseleave", () => { isDrawing = false; });

  // Prevent context menu on right-click over canvas
  canvas.addEventListener("contextmenu", e => e.preventDefault());

  // ── Done / Submit ─────────────────────────────────────────────────────────
  const doneBtn = document.getElementById("done-btn");
  const overlay = document.getElementById("success-overlay");

  doneBtn.addEventListener("click", async () => {
    const birdName = document.getElementById("bird-name").value.trim();
    const birdOrigin = document.getElementById("bird-origin").value.trim();

    if (!birdName) {
      alert("Please enter your name before submitting!");
      document.getElementById("bird-name").focus();
      return;
    }
    if (!birdOrigin) {
      alert("Please enter where you're from before submitting!");
      document.getElementById("bird-origin").focus();
      return;
    }

    doneBtn.disabled = true;
    doneBtn.textContent = "Sending...";

    canvas.toBlob(async blob => {
      const formData = new FormData();
      formData.append("image", blob, "bird.png");
      formData.append("bird_name", birdName);
      formData.append("origin", birdOrigin);

      try {
        const response = await fetch("/submit", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error("Server returned " + response.status);
        }

        overlay.classList.add("visible");
        // Close tab after a short delay so user goes back to the terminal
        setTimeout(() => window.close(), 3000);
      } catch (err) {
        alert("Submission failed: " + err.message + "\n\nPlease try again.");
        doneBtn.disabled = false;
        doneBtn.textContent = "DONE";
      }
    }, "image/png");
  });
</script>
</body>
</html>
